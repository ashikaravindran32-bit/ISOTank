workflows:
  ios-release:
    name: Build .NET MAUI iOS
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      xcode: latest

    scripts:
      - name: Show installed SDKs
        script: |
          dotnet --info
          dotnet --list-sdks

      - name: Install MAUI workload
        script: |
          dotnet workload install maui

      - name: Restore
        script: |
          dotnet restore ISOTankApp/ISOTankApp.csproj

      - name: Publish
        script: |
          dotnet publish ISOTankApp/ISOTankApp.csproj \
            -f net9.0-ios \
            -c Release \
            -r ios-arm64 \
            -p:BuildIpa=true \
            -p:ArchiveOnBuild=true

    artifacts:
      - "**/*.ipa"
      - "**/*.xcarchive"
